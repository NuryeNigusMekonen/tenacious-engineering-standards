site_name: Tenacious Engineering Standards
site_description: The official reference for engineering standards at Tenacious.
site_author: Tenacious Engineering
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Onboarding Guide: onboarding-guide.md
  - Standards:
      - Repository Management: repository-management-standard.md
      - Branching: branching-standard.md
      - Pull Requests: pull-request-standard.md
      - Code Review: code-review-standard.md
      - CI/CD: ci-cd-standard.md
      - Security: security-standard.md
      - Secrets Management: secrets-management-standard.md
      - Release Management: release-management-standard.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tenacious
